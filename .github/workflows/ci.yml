name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pyright
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: actionlint
      - run: shellcheck scripts/*.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest

  # Prove the built wheel installs cleanly into a fresh environment and the
  # console scripts work — the real `uv tool install` / `pipx install` path that
  # each family Mac uses, not just the editable dev install.
  install:
    name: clean install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Build and install the wheel into a clean venv
        run: |
          python -m pip install --upgrade build
          python -m build
          python -m venv "${RUNNER_TEMP}/clean"
          "${RUNNER_TEMP}/clean/bin/pip" install dist/*.whl
      - name: Console scripts and imports work
        run: |
          "${RUNNER_TEMP}/clean/bin/photos-tool" --version
          "${RUNNER_TEMP}/clean/bin/photos-tool" --help >/dev/null
          "${RUNNER_TEMP}/clean/bin/python" -c "import photos_tool.menubar, photos_tool.gui_actions, photos_tool.remove"

  # The point of this job: prove the toolchain installs and our code runs on a
  # clean, generic Apple Silicon Mac. GitHub's macos-14/15 runners are arm64.
  # (CI cannot exercise the real Photos export — no Photos library, no GUI
  # selection, no Full Disk Access. That stays a manual test on a real Mac.)
  macos:
    name: macos (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install package and dev deps
        run: pip install -e ".[dev]"
      - name: Run tests on Apple Silicon
        run: pytest
      - name: Install the real external toolchain
        run: |
          brew install exiftool ffmpeg
          pip install osxphotos==0.76.1
      - name: Smoke-test the toolchain on a clean arm64 Mac
        run: |
          echo "arch: $(uname -m)"
          sw_vers
          python -c "import sys; assert sys.version_info >= (3, 10); print('python', sys.version)"
          osxphotos --version
          exiftool -ver
          ffmpeg -version
          photos-tool check
      - name: Run marker-gated real-tool tests
        run: pytest -m "requires_sips or requires_exiftool or requires_ffmpeg"
