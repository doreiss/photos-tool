name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pyright
      - run: shellcheck scripts/*.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest

  # The point of this job: prove the toolchain installs and our code runs on a
  # clean, generic Apple Silicon Mac. GitHub's macos-14/15 runners are arm64.
  # (CI cannot exercise the real Photos export — no Photos library, no GUI
  # selection, no Full Disk Access. That stays a manual test on a real Mac.)
  macos:
    name: macos (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package and dev deps
        run: pip install -e ".[dev]"
      - name: Run tests on Apple Silicon
        run: pytest
      - name: Install the real external toolchain
        run: |
          brew install exiftool
          pip install osxphotos
      - name: Smoke-test the toolchain on a clean arm64 Mac
        run: |
          echo "arch: $(uname -m)"
          sw_vers
          python -c "import sys; assert sys.version_info >= (3, 10); print('python', sys.version)"
          osxphotos --version
          exiftool -ver
          photos-tool check
