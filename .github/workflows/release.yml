name: release

# Publishes to PyPI via Trusted Publishing (OIDC) when a vX.Y.Z tag is pushed.
# No API token lives in the repo. One-time setup (before the first tag): on
# pypi.org add a "pending publisher" — project photos-tool, owner doreiss, repo
# photos-tool, workflow release.yml, environment pypi.

on:
  push:
    tags:
      - "v*"

permissions: {}

# Two tags in quick succession would otherwise race two publishes (PyPI rejects the dup,
# but the failure is noisy). Don't cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade build
      - name: Verify the tag matches the pyproject version
        run: |
          PKG_VER="$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          TAG_VER="${GITHUB_REF_NAME#v}"
          echo "pyproject=$PKG_VER tag=$TAG_VER"
          test "$PKG_VER" = "$TAG_VER" || { echo "::error::tag $TAG_VER does not match pyproject version $PKG_VER"; exit 1; }
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/photos-tool
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      # SHA-pinned (not the moving @release/v1 branch): this is the one job holding
      # id-token:write + PyPI publish rights. Dependabot bumps the SHA via the comment.
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
